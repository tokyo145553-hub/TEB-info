<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>防災ポータル | 高度地震観測</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { --bg: #0a0a0a; --panel: #161616; --text: #eee; --accent: #ff4d4d; --border: #333; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
#app { max-width: 1100px; margin: auto; }
.grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; }
@media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
#map { height: 400px; border-radius: 12px; border: 1px solid var(--border); background: #000; }
.card { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
textarea { width: 100%; height: 180px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 13px; resize: none; }
button { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
/* 緊急速報オーバーレイ */
#alert-layer { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; text-align: center; }
.alert-box { background: #fff; color: #000; padding: 30px; border-radius: 15px; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.7; } }
</style>
</head>
<body>

<div id="alert-layer"><div class="alert-box"><h1>緊急地震速報</h1><p id="alert-msg"></p></div></div>

<div id="app">
    <header><h1>防災ポータル</h1></header>
    <div class="grid">
        <div id="map"></div>
        <div>
            <div class="card">
                <button onclick="loadLogs()">更新</button>
                <span id="status"> 待機中...</span>
            </div>
            <div id="logs"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([36, 138], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 震度色分け
function getColor(s) { return s >= 60 ? '#f00' : s >= 50 ? '#f50' : s >= 40 ? '#fa0' : '#38f'; }

// 1. P2P WebSocket通信 (メイン)
const ws = new WebSocket("wss://api.p2pquake.net/v2/ws");
ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.code === 552) triggerAlert("緊急地震速報", data.text);
    if (data.code === 551) loadLogs();
};

// 2. Wolfs API監視 (バックアップ)
async function checkWolfs() {
    try {
        const res = await fetch("https://api.wolfs.dev/v1/eew");
        const d = await res.json();
        if (d.is_active) triggerAlert("緊急地震速報(Wolfs)", d.reason);
    } catch(e){}
}
setInterval(checkWolfs, 10000);

function triggerAlert(t, m) {
    document.getElementById("alert-layer").style.display = "flex";
    document.getElementById("alert-msg").innerText = m;
    setTimeout(() => document.getElementById("alert-layer").style.display = "none", 15000);
}

async function loadLogs() {
    const res = await fetch("https://api.p2pquake.net/v2/history?codes=551&limit=3");
    const data = await res.json();
    let html = "";
    
    data.forEach((q, i) => {
        const h = q.earthquake.hypocenter;
        const text = `【地震情報】\n震源：${h.name}\n深さ：${h.depth}km\nマグニチュード：${q.earthquake.magnitude}\n最大震度：${q.earthquake.maxScale/10}\n発生：${q.earthquake.time}`;
        
        html += `<div class="card"><h3>${h.name}</h3><textarea readonly>${text}</textarea></div>`;
        
        if (i === 0) {
            map.setView([h.latitude, h.longitude], 6);
            q.points.forEach(p => L.circleMarker([p.latitude, p.longitude], {color: getColor(p.scale), radius: 4}).addTo(map));
        }
    });
    document.getElementById("logs").innerHTML = html;
    document.getElementById("status").innerText = "最終更新: " + new Date().toLocaleTimeString();
}

loadLogs();
</script>
</body>
</html>
