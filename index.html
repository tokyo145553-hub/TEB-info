<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防災ポータル - メニュー</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #333; color: #fff; padding: 1.5rem; text-align: center; }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .menu-btn {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.2s;
        }
        .menu-btn:hover { background: #eef; transform: translateY(-3px); }
        .menu-btn span { display: block; font-size: 0.9rem; color: #666; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>
    <header><h1>防災ポータル</h1></header>
    <main class="menu-container">
        <a href="earthquake.html" class="menu-btn">地震情報<span>震源・震度情報など</span></a>
    </main>
</body>
</html>
