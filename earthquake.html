<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>地震情報詳細 - 防災ポータル</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #121212; color: #fff; margin: 0; font-family: sans-serif; }
        .content { max-width: 900px; margin: 0 auto; padding: 20px; }
        #map { height: 400px; width: 100%; border: 1px solid #444; border-radius: 8px; }
        #intensity-list { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 8px; }
    </style>
</head>
<body>

<main class="content">
    <div id="map"></div>
    <div id="intensity-list">
        <h3>各地の震度詳細</h3>
        <div id="intensity-text">データ解析中...</div>
    </div>
</main>

<script>
    const map = L.map('map').setView([37.0, 140.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);

    fetch("https://api.p2pquake.net/v2/history?codes=551&limit=1")
    .then(res => res.json())
    .then(data => {
        const q = data[0];
        const points = q.points || [];
        const grouped = {};

        points.forEach(p => {
            // 震度コードを変換
            const s = {10:"1", 20:"2", 30:"3", 40:"4", 45:"5弱", 50:"5強", 55:"6弱", 60:"6強", 70:"7"}[p.scale] || p.scale;
            
            // 1. 地図プロット（緯度経度がある場合のみ実行）
            if (p.lat !== undefined && p.lng !== undefined) {
                L.circleMarker([p.lat, p.lng], {
                    radius: 6,
                    fillColor: "#ffcc00",
                    color: "#000",
                    fillOpacity: 0.9
                }).addTo(map).bindPopup(`${p.addr}: 震度${s}`);
            }

            // 2. リスト集計
            if(!grouped[s]) grouped[s] = {};
            if(!grouped[s][p.pref]) grouped[s][p.pref] = [];
            grouped[s][p.pref].push(p.addr);
        });

        // リスト生成
        let html = "";
        Object.keys(grouped).sort().reverse().forEach(s => {
            html += `<div><strong>震度 ${s}</strong><br>`;
            for (const pref in grouped[s]) {
                html += `<small style="color:#aaa">${pref}:</small> ${grouped[s][pref].join('、')}<br>`;
            }
            html += `</div><hr style="border:0; border-top:1px solid #333;">`;
        });
        document.getElementById('intensity-text').innerHTML = html || "観測データがありません";
    });
</script>
</body>
</html>
