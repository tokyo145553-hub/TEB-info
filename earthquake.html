<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報 - 防災ポータル</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #121212; color: #fff; margin: 0; font-family: sans-serif; }
        header { background: #d32f2f; padding: 1rem; text-align: center; }
        .content { max-width: 900px; margin: 0 auto; padding: 20px; }
        #map { height: 400px; width: 100%; border: 1px solid #444; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <header><h1>地震情報</h1></header>
    <div class="content">
        <a href="index.html" style="color: #fff;">← ホームに戻る</a>
        <div id="map"></div>
        <table>
            <tr><th>震源地</th><td id="location">-</td></tr>
            <tr><th>最大震度</th><td id="intensity">-</td></tr>
        </table>
    </div>

    <script>
        const map = L.map('map').setView([36.0, 138.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);

        function getScaleColor(scale) {
            const colors = {1:"#ffffff", 2:"#3399ff", 3:"#00cc00", 4:"#ffff00", 5:"#ff9900", 6:"#ff0000"};
            return colors[scale] || "#ff00ff";
        }

        fetch("https://api.p2pquake.net/v2/history?codes=551&limit=1")
            .then(res => res.json())
            .then(data => {
                const q = data[0].earthquake;
                document.getElementById('location').textContent = q.hypocenter.name;
                document.getElementById('intensity').textContent = q.maxScale;
                L.marker([q.hypocenter.latitude, q.hypocenter.longitude]).addTo(map);
                data[0].points.forEach(p => {
                    L.circleMarker([p.lat, p.lng], {
                        radius: 5, fillColor: getScaleColor(p.scale), color: "#000", fillOpacity: 0.9, weight: 0.5
                    }).addTo(map).bindPopup(p.addr + " 震度" + p.scale);
                });
            });
    </script>
</body>
</html>
